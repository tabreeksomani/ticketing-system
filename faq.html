<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
<title>Mulaqat Express FAQ — Mulaqat Express System</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: #F3EFE7; color: #241C10; font-family: 'Segoe UI', system-ui, sans-serif; }
  header { position: sticky; top: 0; z-index: 5; background: #FFFFFF; border-bottom: 1px solid #E8E1D3; padding: max(16px, env(safe-area-inset-top)) 16px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  header .title { font-weight: 800; font-size: 16px; font-family: 'Palatino Linotype', Georgia, serif; color: #241C10; }
  header button, header #homeBtn { font-size: 12px; color: #57534E; background: #F7F5F0; border: 1px solid #E2D9C4; border-radius: 8px; padding: 7px 12px; cursor: pointer; }
  header #homeBtn { display: inline-flex; align-items: center; gap: 5px; text-decoration: none; }
  .live { display: inline-block; background: #1565C0; color: #FFFFFF; font-size: 11px; font-weight: 800; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 5px; margin-right: 8px; vertical-align: middle; }
  #pdf { max-width: 900px; margin: 0 auto; padding: 20px 16px 40px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  #pdf canvas { width: 100%; height: auto; background: #FFFFFF; border-radius: 8px; box-shadow: 0 2px 10px rgba(36,28,16,0.12); }
  .pdf-status { padding: 48px 20px; text-align: center; font-size: 14px; color: #4a4436; }
  .pdf-status a { color: #8C734C; font-weight: 700; }
</style>
</head>
<body>
  <header>
    <div class="title"><span class="live">LIVE</span>Mulaqat Express FAQ</div>
    <a href="index.html" id="homeBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9v11h14V9"/></svg> Home</a>
  </header>
  <div id="pdf"><div class="pdf-status">Loading…</div></div>

  <script src="vendor/pdf.min.js"></script>
  <script>
    (function () {
      const PDF_URL = 'me-faq.pdf';
      const container = document.getElementById('pdf');
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'vendor/pdf.worker.min.js';

      let pdfDoc = null;
      let renderToken = 0; // bumps on each render pass so stale async renders bail out

      async function render() {
        const token = ++renderToken;
        // Target CSS width the canvases will display at, then multiply by the
        // device pixel ratio so the raster is crisp on high-DPI screens.
        const cssWidth = container.clientWidth - 32; // minus horizontal padding
        const dpr = window.devicePixelRatio || 1;

        // Render into a detached fragment, then swap it in at the end. This drops
        // the "Loading…" placeholder and avoids a half-rendered flash on resize.
        const frag = document.createDocumentFragment();
        for (let n = 1; n <= pdfDoc.numPages; n++) {
          const page = await pdfDoc.getPage(n);
          if (token !== renderToken) return; // a newer render started; abandon this one
          const unscaled = page.getViewport({ scale: 1 });
          const viewport = page.getViewport({ scale: (cssWidth / unscaled.width) * dpr });

          const canvas = document.createElement('canvas');
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);
          canvas.style.maxWidth = (viewport.width / dpr) + 'px';
          frag.appendChild(canvas);

          await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
          if (token !== renderToken) return;
        }
        container.replaceChildren(frag);
      }

      pdfjsLib.getDocument(PDF_URL).promise
        .then((doc) => { pdfDoc = doc; return render(); })
        .catch((err) => {
          console.error('Failed to render FAQ PDF:', err);
          container.innerHTML =
            '<div class="pdf-status">Couldn’t load the FAQ. ' +
            '<a href="' + PDF_URL + '">Open the PDF</a> instead.</div>';
        });

      // Re-render on resize/orientation change so the pages stay sharp and fit width.
      let resizeTimer;
      window.addEventListener('resize', () => {
        if (!pdfDoc) return;
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(render, 200);
      });
    })();
  </script>
  <script src="src/footer.js" data-include-whatsapp="false" data-bypass-auth="true"></script>
</body>
</html>
